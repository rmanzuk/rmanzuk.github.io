baseURL = "https://rmanzuk.github.io/"
languageCode = "en-us"
title = "Ryan A. Manzuk"
publishDir = "docs"
theme = "cactus"

[params]
    colortheme = "white" # Options: dark, light, white, or classic
    description = "Earth Scientist | Human Rights, Justice, and Policy Researcher | Communicator"
    mainSection = "projects"
    mainSectionTitle = "Discoveries"
    showAllPostsOnHomePage = false
    postsOnHomePage = 5
    tagsOverview = true
    tocInline = true
    showProjectsList = false  # to use the template's default project list
    googleAnalytics = ""  # Disable it
    logo = "images/ryan_manzuk_headshot.jpg" # point to image to use for logo

[[params.social]]
    name = "github"
    link = "https://github.com/rmanzuk"

[[params.social]]
    name = "instagram"
    link = "https://www.instagram.com/earth_to_ryan/" 

[[params.social]]
    name = "email"
    link = "mailto:rmanzuk@princeton.edu"  # Added "mailto:" for proper email links

[[params.social]]
    name = "linkedin"
    link = "https://www.linkedin.com/in/ryan-manzuk"  # Fixed missing "https://"

[params.comments]
    enabled = false

# Main menu which appears below site header.
[[menu.main]]
    name = "Home "
    url = "/"
    weight = 1

[[menu.main]]
    name = "Projects "
    url = "/projects"
    weight = 2

[[menu.main]]
    name = "CV "
    url = "/files/cv_rmanzuk.pdf"
    weight = 3
    params = { target = "_blank" }

[[menu.main]]
    name = "About"
    url = "/about"
    weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true